aid: uplead
name: UpLead
description: >
  UpLead is a B2B contact and company data platform providing a REST API for
  searching leads, verifying emails, accessing company profiles, and enriching
  contact information. The API enables developers to look up verified contacts
  by email or name, search companies by domain or name, run prospector queries
  to find contacts by job title or function, and perform combined person-plus-company
  lookups in a single call. UpLead operates on a credit-based billing model
  where charges only apply when verified data is returned.
